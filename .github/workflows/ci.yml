name: safesteer-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic prometheus_client pytest dvc httpx

      - name: Validate DVC DAG
        run: dvc dag

      - name: Run unit tests
        run: pytest tests/ -v
